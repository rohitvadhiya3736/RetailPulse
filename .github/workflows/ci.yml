name: RetailPulse CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-cov

      - name: Lint with Ruff
        run: ruff check src tests scripts --ignore E501

      - name: Generate sample data
        run: python scripts/generate_sample_data.py

      - name: Run unit tests
        run: pytest tests/ -v --cov=src --cov-report=xml --cov-fail-under=50

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  train-smoke:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate data and train (smoke)
        run: |
          python scripts/generate_sample_data.py
          python scripts/train_all.py
        timeout-minutes: 30

      - name: Validate metrics gates
        run: |
          python -c "
          import json
          from pathlib import Path
          fc = json.load(open('artifacts/models/forecasting/forecast_metrics.json'))
          ch = json.load(open('artifacts/models/churn/churn_metrics.json'))
          assert fc['mape'] <= 15, f'MAPE too high: {fc[\"mape\"]}'
          assert ch['roc_auc'] >= 0.80, f'AUC too low: {ch[\"roc_auc\"]}'
          print('Metrics gates passed')
          "

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: artifacts/models/
          retention-days: 7

  docker-build:
    runs-on: ubuntu-latest
    needs: train-smoke
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t retailpulse:latest .

      - name: Smoke test container
        run: |
          docker run -d --name rp-test -p 8501:8501 retailpulse:latest dashboard
          sleep 15
          curl -f http://localhost:8501/_stcore/health || exit 1
          docker stop rp-test
