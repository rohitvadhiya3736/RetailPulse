version: "3.9"

services:
  retailpulse-api:
    build: .
    container_name: retailpulse-api
    command: ["api"]
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts
      - ./mlflow:/app/mlflow
    environment:
      - RETAILPULSE_CONFIG=/app/src/config/settings.yaml
    restart: unless-stopped

  retailpulse-dashboard:
    build: .
    container_name: retailpulse-dashboard
    command: ["dashboard"]
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts
    depends_on:
      - retailpulse-api
    restart: unless-stopped

  mlflow:
    image: python:3.11-slim
    container_name: retailpulse-mlflow
    working_dir: /mlflow
    command: >
      bash -c "pip install mlflow && mlflow server
      --backend-store-uri /mlflow/mlruns
      --default-artifact-root /mlflow/mlruns
      --host 0.0.0.0 --port 5000"
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow:/mlflow

  airflow:
    image: apache/airflow:2.8.1-python3.11
    container_name: retailpulse-airflow
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - .:/app
    ports:
      - "8080:8080"
    command: airflow standalone

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: retailpulse-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - retailpulse-api
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    container_name: retailpulse-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:
