apiVersion: v1
kind: ConfigMap
metadata:
  name: retailpulse-prometheus-config
  namespace: retailpulse
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets:
              - localhost:9090

      - job_name: retailpulse-api
        metrics_path: /metrics
        static_configs:
          - targets:
              - retailpulse-api.retailpulse.svc.cluster.local:8000
