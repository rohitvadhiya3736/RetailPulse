apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: retailpulse-data
  namespace: retailpulse
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: retailpulse-artifacts
  namespace: retailpulse
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

