# RetailPulse – Central configuration
project:
  name: RetailPulse
  version: "1.0.0"
  random_seed: 42

paths:
  raw_data: data/raw/online_retail.csv
  processed_data: data/processed/retail_features.parquet
  reference_data: data/reference/reference_snapshot.parquet
  artifacts_dir: artifacts
  models_dir: artifacts/models
  plots_dir: artifacts/plots
  reports_dir: artifacts/reports

data:
  date_column: InvoiceDate
  target_forecast: daily_sales
  target_churn: ChurnFlag
  test_size: 0.2
  validation_size: 0.1
  churn_threshold_days: 90

feature_engineering:
  rolling_windows: [7, 30]
  lag_days: [1, 7]
  product_categories: 8
  n_segments_kmeans: 6

segmentation:
  kmeans_clusters: 6
  dbscan_eps: 0.8
  dbscan_min_samples: 5
  rfm_weights:
    recency: 0.35
    frequency: 0.35
    monetary: 0.30

forecasting:
  forecast_horizon_days: 30
  prophet:
    yearly_seasonality: true
    weekly_seasonality: true
    daily_seasonality: false
    changepoint_prior_scale: 0.05
  xgboost:
    n_estimators: 300
    max_depth: 6
    learning_rate: 0.05
  lstm:
    hidden_size: 64
    num_layers: 2
    dropout: 0.2
    sequence_length: 14
    epochs: 25
    batch_size: 32
    learning_rate: 0.001
  ensemble_weights:
    prophet: 0.35
    xgboost: 0.35
    lstm: 0.30
  target_mape: 12.0

churn:
  target_auc: 0.88
  xgboost:
    n_estimators: 400
    max_depth: 5
    learning_rate: 0.03
    scale_pos_weight: 2.5
  optuna_trials: 30

inventory:
  safety_stock_z: 1.65
  lead_time_days: 7
  service_level: 0.95
  reorder_multiplier: 1.2

mlflow:
  tracking_uri: mlflow/mlruns
  experiment_name: retailpulse-production
  registered_model_prefix: retailpulse

evidently:
  drift_threshold: 0.15
  report_path: artifacts/reports/drift_report.html

api:
  host: "0.0.0.0"
  port: 8000
  reload: false

logging:
  level: INFO
  format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"
  file: artifacts/retailpulse.log
